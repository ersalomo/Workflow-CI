name: CI – Retrain Model with MLflow Projects

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      n_estimators:
        description: "Number of trees"
        required: false
        default: "120"
      max_depth:
        description: "Max tree depth"
        required: false
        default: "6"

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('MLProject/conda.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 scikit-learn pandas numpy matplotlib joblib

      - name: Validate preprocessed dataset exists
        run: |
          mkdir -p MLProject/namadataset_preprocessing
          if [ ! -f "MLProject/namadataset_preprocessing/wine_preprocessed.csv" ] && [ -f "MLProject/wine_preprocessed.csv" ]; then
            cp MLProject/wine_preprocessed.csv MLProject/namadataset_preprocessing/wine_preprocessed.csv
          fi
          
          if [ ! -f "MLProject/namadataset_preprocessing/wine_preprocessed.csv" ]; then
            echo "wine_preprocessed.csv not found! Generating from raw data..."
            pip install scikit-learn pandas numpy
            python -c "
            import pandas as pd
            import os
            raw_path = 'wine_quality_raw.csv' if os.path.exists('wine_quality_raw.csv') else '../wine_quality_raw.csv'
            df = pd.read_csv(raw_path)
            df.to_csv('MLProject/namadataset_preprocessing/wine_preprocessed.csv', index=False)
            print('Generated wine_preprocessed.csv inside namadataset_preprocessing')
            "
          else
            echo "wine_preprocessed.csv found ($(wc -l < MLProject/namadataset_preprocessing/wine_preprocessed.csv) rows)"
          fi

      - name: Run MLflow Project (re-train)
        env:
          MLFLOW_TRACKING_URI: "https://dagshub.com/ersalomo/Membangun-Sistem-Machine-Learning.mlflow"
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          N_EST="${{ github.event.inputs.n_estimators || '120' }}"
          MAX_D="${{ github.event.inputs.max_depth || '6' }}"
          echo "Training with n_estimators=$N_EST, max_depth=$MAX_D"
          mlflow run MLProject \
            -P n_estimators=$N_EST \
            -P max_depth=$MAX_D \
            --env-manager=local


      - name: Build and Push Docker Image using MLflow
        if: github.ref == 'refs/heads/main'
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          MLFLOW_TRACKING_URI: "https://dagshub.com/ersalomo/Membangun-Sistem-Machine-Learning.mlflow"
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "DockerHub secrets not set, skipping build and push."
            exit 0
          fi
          echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

          # Find the newest MLmodel file inside any mlruns directory
          MODEL_PATH=$(find . -path "*/mlruns/*/artifacts/model/MLmodel" \
            -not -path "*/tmp/*" \
            -printf '%T@ %p\n' 2>/dev/null \
            | sort -rn | head -1 | awk '{print $2}' | xargs dirname)

          echo "Latest model path: $MODEL_PATH"

          if [ -n "$MODEL_PATH" ] && [ -d "$MODEL_PATH" ]; then
            mlflow models build-docker \
              -m "$MODEL_PATH" \
              -n "$DOCKERHUB_USERNAME/wine-quality-mlproject:latest"
            docker push "$DOCKERHUB_USERNAME/wine-quality-mlproject:latest"
            echo "Docker image pushed: $DOCKERHUB_USERNAME/wine-quality-mlproject:latest"
          else
            echo "No MLflow model found, skipping Docker build."
          fi

      - name: Upload MLflow artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-training-artifacts
          path: |
            MLProject/mlruns/
            MLProject/artifacts/
          retention-days: 30
