name: CI – Retrain Model with MLflow Projects

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      n_estimators:
        description: "Number of trees"
        required: false
        default: "120"
      max_depth:
        description: "Max tree depth"
        required: false
        default: "6"

jobs:
  train:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('MLProject/conda.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 scikit-learn pandas numpy matplotlib joblib

      - name: Validate preprocessed dataset exists
        run: |
          mkdir -p MLProject/namadataset_preprocessing
          if [ ! -f "MLProject/namadataset_preprocessing/wine_preprocessed.csv" ] && [ -f "MLProject/wine_preprocessed.csv" ]; then
            cp MLProject/wine_preprocessed.csv MLProject/namadataset_preprocessing/wine_preprocessed.csv
          fi
          
          if [ ! -f "MLProject/namadataset_preprocessing/wine_preprocessed.csv" ]; then
            echo "wine_preprocessed.csv not found! Generating from raw data..."
            pip install scikit-learn pandas numpy
            python -c "
            import pandas as pd
            import os
            raw_path = 'wine_quality_raw.csv' if os.path.exists('wine_quality_raw.csv') else '../wine_quality_raw.csv'
            df = pd.read_csv(raw_path)
            df.to_csv('MLProject/namadataset_preprocessing/wine_preprocessed.csv', index=False)
            print('Generated wine_preprocessed.csv inside namadataset_preprocessing')
            "
          else
            echo "wine_preprocessed.csv found ($(wc -l < MLProject/namadataset_preprocessing/wine_preprocessed.csv) rows)"
          fi

      - name: Run MLflow Project (re-train)
        env:
          MLFLOW_TRACKING_URI: "https://dagshub.com/ersalomo/Membangun-Sistem-Machine-Learning.mlflow"
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          N_EST="${{ github.event.inputs.n_estimators || '120' }}"
          MAX_D="${{ github.event.inputs.max_depth || '6' }}"
          echo "Training with n_estimators=$N_EST, max_depth=$MAX_D"
          mlflow run MLProject \
            -P n_estimators=$N_EST \
            -P max_depth=$MAX_D \
            --env-manager=local


      - name: Build and Push Docker Image using MLflow
        if: github.ref == 'refs/heads/main'
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          MLFLOW_TRACKING_URI: "https://dagshub.com/ersalomo/Membangun-Sistem-Machine-Learning.mlflow"
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "DockerHub secrets not set, skipping build and push."
            exit 0
          fi
          echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

          # Find the newest MLmodel file inside any mlruns directory
          MLMODEL_FILE=$(find . -path "*/mlruns/*/artifacts/model/MLmodel" \
            -not -path "*/tmp/*" 2>/dev/null \
            | head -1)

          echo "Found MLmodel at: $MLMODEL_FILE"

          if [ -n "$MLMODEL_FILE" ]; then
            MODEL_PATH=$(dirname "$MLMODEL_FILE")
            echo "Model path: $MODEL_PATH"
            mlflow models build-docker \
              -m "$MODEL_PATH" \
              -n "$DOCKERHUB_USERNAME/wine-quality-mlproject:latest"
            docker push "$DOCKERHUB_USERNAME/wine-quality-mlproject:latest"
            echo "Docker image pushed: $DOCKERHUB_USERNAME/wine-quality-mlproject:latest"
          else
            echo "No MLflow model found, skipping Docker build."
          fi

      - name: Upload MLflow artifacts (GitHub Actions)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-training-artifacts
          path: |
            MLProject/mlruns/
            MLProject/artifacts/
          retention-days: 30

      - name: Commit trained model artifacts to repository
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Gunakan GITHUB_TOKEN agar push diizinkan
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}

          # Copy artifacts to a tracked folder
          mkdir -p MLProject/model_artifacts
          if [ -d "MLProject/artifacts" ]; then
            cp -r MLProject/artifacts/. MLProject/model_artifacts/ 2>/dev/null || true
          fi

          # Copy latest model plots if exists
          MLMODEL_FILE=$(find . -path "*/mlruns/*/artifacts/model/MLmodel" \
            -not -path "*/tmp/*" 2>/dev/null | head -1)
          if [ -n "$MLMODEL_FILE" ]; then
            MODEL_DIR=$(dirname "$MLMODEL_FILE")
            cp "$MODEL_DIR"/../*.png MLProject/model_artifacts/ 2>/dev/null || true
          fi

          git add MLProject/model_artifacts/ || true
          git diff-index --quiet HEAD || \
            git commit -m "ci: update trained model artifacts [skip ci]"
          git push

      - name: Upload artifacts to Google Shared Drive
        if: always()
        env:
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          if [ -z "$GDRIVE_CREDENTIALS" ] || [ -z "$GDRIVE_FOLDER_ID" ]; then
            echo "Google Drive secrets not set, skipping upload."
            exit 0
          fi

          pip install google-auth google-api-python-client 2>/dev/null

          python - <<'EOF'
          import os, json, zipfile
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload
          from google.oauth2 import service_account

          # Load credentials
          creds_json  = json.loads(os.environ["GDRIVE_CREDENTIALS"])
          folder_id   = os.environ["GDRIVE_FOLDER_ID"]
          run_number  = os.environ.get("GITHUB_RUN_NUMBER", "0")

          creds = service_account.Credentials.from_service_account_info(
              creds_json,
              scopes=["https://www.googleapis.com/auth/drive"]
          )
          service = build("drive", "v3", credentials=creds)

          # Zip artifacts
          zip_path = f"/tmp/mlflow_artifacts_run_{run_number}.zip"
          added = 0
          with zipfile.ZipFile(zip_path, "w", zipfile.ZIP_DEFLATED) as zf:
              for folder in ["MLProject/artifacts", "MLProject/mlruns"]:
                  if os.path.isdir(folder):
                      for root, dirs, files in os.walk(folder):
                          for file in files:
                              fp = os.path.join(root, file)
                              zf.write(fp, os.path.relpath(fp, "MLProject"))
                              added += 1

          if added == 0:
              print("No artifact files found, skipping upload.")
              exit(0)

          print(f"Zipped {added} files -> {zip_path}")

          # Upload ke Shared Drive (wajib pakai supportsAllDrives=True)
          file_name     = f"mlflow_artifacts_run_{run_number}.zip"
          media         = MediaFileUpload(zip_path, mimetype="application/zip", resumable=True)
          file_metadata = {"name": file_name, "parents": [folder_id]}

          uploaded = service.files().create(
              body=file_metadata,
              media_body=media,
              fields="id, name",
              supportsAllDrives=True   # <-- wajib untuk Shared Drive
          ).execute()

          print(f"Uploaded to Shared Drive: {file_name} (id={uploaded.get('id')})")
          EOF
