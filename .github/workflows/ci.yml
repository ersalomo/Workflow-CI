name: CI – Retrain Model with MLflow Projects

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      n_estimators:
        description: "Number of trees"
        required: false
        default: "120"
      max_depth:
        description: "Max tree depth"
        required: false
        default: "6"

jobs:
  train:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Run actions/checkout@v3
        uses: actions/checkout@v4

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"

      - name: Check Env
        run: |
          echo "=== Python & OS Version ==="
          python --version
          pip --version
          uname -a
          echo "=== Directory Structure ==="
          ls -la

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 scikit-learn pandas numpy matplotlib joblib
          
          # Patch MLflow library for Python 3.9 get-pip compatibility
          PYTHON_DOCKER_UTILS=$(python3 -c "import mlflow.models.docker_utils as d; print(d.__file__)")
          echo "Patching MLflow library file at: $PYTHON_DOCKER_UTILS"
          sed -i 's|https://bootstrap.pypa.io/get-pip.py|https://bootstrap.pypa.io/pip/3.9/get-pip.py|g' "$PYTHON_DOCKER_UTILS"

      - name: Run mlflow project
        run: |
          # Validate preprocessed dataset exists
          mkdir -p MLProject/namadataset_preprocessing
          if [ ! -f "MLProject/namadataset_preprocessing/wine_preprocessed.csv" ] && [ -f "MLProject/wine_preprocessed.csv" ]; then
            cp MLProject/wine_preprocessed.csv MLProject/namadataset_preprocessing/wine_preprocessed.csv
          fi
          
          if [ ! -f "MLProject/namadataset_preprocessing/wine_preprocessed.csv" ]; then
            echo "wine_preprocessed.csv not found! Generating from raw data..."
            python -c "
            import pandas as pd
            import os
            raw_path = 'wine_quality_raw.csv' if os.path.exists('wine_quality_raw.csv') else '../wine_quality_raw.csv'
            df = pd.read_csv(raw_path)
            df.to_csv('MLProject/namadataset_preprocessing/wine_preprocessed.csv', index=False)
            "
          fi

          N_EST="${{ github.event.inputs.n_estimators || '120' }}"
          MAX_D="${{ github.event.inputs.max_depth || '6' }}"
          echo "Training with n_estimators=$N_EST, max_depth=$MAX_D"

          # Gunakan absolute local tracking agar model & runs tersimpan di folder yang sama
          MLFLOW_TRACKING_URI="file://${{ github.workspace }}/mlruns" \
          mlflow run MLProject \
            -P n_estimators=$N_EST \
            -P max_depth=$MAX_D \
            --env-manager=local

          # Tampilkan hasil pencarian model
          echo "--- MLmodel files found ---"
          find . -path "*/mlruns/*/artifacts/model/MLmodel" -not -path "*/tmp/*" 2>/dev/null || echo "none"

      - name: Get latest MLflow run_id
        id: get_run_id
        run: |
          RUN_ID=$(python -c "
          import mlflow
          client = mlflow.tracking.MlflowClient(tracking_uri='file:./mlruns')
          experiments = client.search_experiments()
          all_runs = []
          for exp in experiments:
              runs = client.search_runs(exp.experiment_id, order_by=['start_time DESC'])
              if runs:
                  all_runs.extend(runs)
          if all_runs:
              all_runs.sort(key=lambda r: r.info.start_time, reverse=True)
              print(all_runs[0].info.run_id)
          else:
              print('')
          ")
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "Latest MLflow Run ID: $RUN_ID"

      - name: Install Python dependencies
        run: |
          echo "Installing additional Python dependencies..."
          pip install google-auth google-api-python-client 2>/dev/null || true

      - name: Upload to GitHub LFS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MLFLOW_TRACKING_URI: "https://dagshub.com/ersalomo/Membangun-Sistem-Machine-Learning.mlflow"
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          # 1. Sync metrics to DagsHub if credentials are available
          if [ -n "$MLFLOW_TRACKING_USERNAME" ]; then
            echo "Syncing metrics to DagsHub..."
            python - <<'EOF'
            import mlflow, os
            try:
                local_client = mlflow.tracking.MlflowClient(tracking_uri="file:./mlruns")
                experiments  = local_client.search_experiments()
                if experiments:
                    runs = local_client.search_runs([e.experiment_id for e in experiments], order_by=["start_time DESC"])
                    latest_run = None
                    for r in runs:
                        if "f1_score" in r.data.metrics or "accuracy" in r.data.metrics:
                            latest_run = r
                            break
                    if latest_run is None and runs:
                        latest_run = runs[0]
                    
                    if latest_run:
                        params  = latest_run.data.params
                        metrics = latest_run.data.metrics
                        run_name = latest_run.info.run_name
                        
                        mlflow.set_experiment("Wine_Quality_CI_Experiment")
                        with mlflow.start_run(run_name=f"CI_{run_name}"):
                            for k, v in params.items():
                                mlflow.log_param(k, v)
                            for k, v in metrics.items():
                                mlflow.log_metric(k, v)
                            mlflow.log_param("ci_run_number", os.environ.get("GITHUB_RUN_NUMBER", "0"))
                            mlflow.log_param("ci_triggered_by", "github-actions")
                        print("Run synced to DagsHub successfully!")
            except Exception as e:
                print(f"DagsHub sync error: {e}")
          EOF
          fi

          # 2. Commit artifacts to GitHub Repository using LFS
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}

          # Inisialisasi Git LFS
          git lfs install

          # Track model artifacts folder using Git LFS
          git lfs track "MLProject/model_artifacts/**" || true

          mkdir -p MLProject/model_artifacts
          if [ -d "MLProject/artifacts" ]; then
            cp -r MLProject/artifacts/. MLProject/model_artifacts/ 2>/dev/null || true
          fi

          MLMODEL_FILE=$(find . -path "*/mlruns/*/artifacts/model/MLmodel" -not -path "*/tmp/*" 2>/dev/null | head -1)
          if [ -n "$MLMODEL_FILE" ]; then
            MODEL_DIR=$(dirname "$MLMODEL_FILE")
            cp "$MODEL_DIR"/../*.png MLProject/model_artifacts/ 2>/dev/null || true
          fi

          # Add .gitattributes and LFS model artifacts
          git add .gitattributes || true
          git add MLProject/model_artifacts/ || true

          if ! git diff --cached --quiet; then
            git commit -m "ci: update trained model artifacts using Git LFS [skip ci]"
            git push
          else
            echo "No artifact changes to commit."
          fi

      - name: Build Docker Model
        if: github.ref == 'refs/heads/main'
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ] || [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "DockerHub credentials not configured. Skipping step."
            exit 0
          fi

          MLMODEL_FILE=$(find "${{ github.workspace }}/mlruns" -name "MLmodel" 2>/dev/null | head -1)
          if [ -z "$MLMODEL_FILE" ]; then
            MLMODEL_FILE=$(find . -path "*/mlruns/*/artifacts/model/MLmodel" -not -path "*/tmp/*" 2>/dev/null | head -1)
          fi

          if [ -n "$MLMODEL_FILE" ]; then
            MODEL_PATH=$(dirname "$MLMODEL_FILE")
            echo "Model path: $MODEL_PATH"

            # Patch Python version to 3.12.7
            sed -i 's/python_version: 3\.[0-9.]*/python_version: 3.12.7/g' "$MODEL_PATH/MLmodel" || true
            sed -i 's/python: 3\.[0-9.]*/python: 3.12.7/g' "$MODEL_PATH/python_env.yaml" || true
            sed -i 's/python=3\.[0-9.]*/python=3.12.7/g' "$MODEL_PATH/conda.yaml" || true

            mlflow models build-docker \
              -m "$MODEL_PATH" \
              -n "${{ secrets.DOCKERHUB_USERNAME }}/wine-quality-mlproject:latest"
          else
            echo "No model found to build Docker image."
            exit 1
          fi

      - name: Log in to Docker Hub
        if: github.ref == 'refs/heads/main'
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ] || [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "DockerHub credentials not configured. Skipping step."
            exit 0
          fi
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Tag Docker Image
        if: github.ref == 'refs/heads/main'
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ] || [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "DockerHub credentials not configured. Skipping step."
            exit 0
          fi
          docker tag "${{ secrets.DOCKERHUB_USERNAME }}/wine-quality-mlproject:latest" "${{ secrets.DOCKERHUB_USERNAME }}/wine-quality-mlproject:${{ github.run_number }}"
          echo "Tagged image with run number: ${{ github.run_number }}"

      - name: Push Docker Image
        if: github.ref == 'refs/heads/main'
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ] || [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "DockerHub credentials not configured. Skipping step."
            exit 0
          fi
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/wine-quality-mlproject:latest"
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/wine-quality-mlproject:${{ github.run_number }}"
