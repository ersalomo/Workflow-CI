name: CI – Retrain Model with MLflow Projects

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      n_estimators:
        description: "Number of trees"
        required: false
        default: "120"
      max_depth:
        description: "Max tree depth"
        required: false
        default: "6"

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('Workflow-CI/MLProject/conda.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow>=2.0.0 scikit-learn pandas numpy matplotlib joblib

      - name: Validate preprocessed dataset exists
        run: |
          if [ ! -f "MLProject/wine_preprocessed.csv" ]; then
            echo "wine_preprocessed.csv not found! Generating from raw data..."
            pip install scikit-learn pandas numpy
            cd MLProject
            python -c "
            import pandas as pd
            from sklearn.preprocessing import LabelEncoder
            df = pd.read_csv('../wine_quality_raw.csv' if __import__('os').path.exists('../wine_quality_raw.csv') else 'wine_quality_raw.csv')
            df.to_csv('wine_preprocessed.csv', index=False)
            print('Generated wine_preprocessed.csv')
            "
          else
            echo "wine_preprocessed.csv found ($(wc -l < MLProject/wine_preprocessed.csv) rows)"
          fi

      - name: Run MLflow Project (re-train)
        env:
          MLFLOW_TRACKING_URI: "https://dagshub.com/ersalomo/Membangun-Sistem-Machine-Learning.mlflow"
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          N_EST="${{ github.event.inputs.n_estimators || '120' }}"
          MAX_D="${{ github.event.inputs.max_depth || '6' }}"
          echo "Training with n_estimators=$N_EST, max_depth=$MAX_D"
          mlflow run MLProject \
            -P n_estimators=$N_EST \
            -P max_depth=$MAX_D \
            --env-manager=local


      - name: Build and Push Docker Image using MLflow
        if: github.ref == 'refs/heads/main'
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          MLFLOW_TRACKING_URI: "https://dagshub.com/ersalomo/Membangun-Sistem-Machine-Learning.mlflow"
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "DockerHub secrets not set, skipping build and push."
            exit 0
          fi
          echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

          # Find the latest run ID from local mlruns (mlflow run dijalankan dari root repo)
          MLRUNS_DIR="MLProject/mlruns"
          if [ ! -d "$MLRUNS_DIR" ]; then
            MLRUNS_DIR="mlruns"
          fi
          echo "Looking for runs in: $MLRUNS_DIR"

          RUN_ID=$(find "$MLRUNS_DIR" -name "MLmodel" | head -1 | xargs dirname | xargs dirname | xargs basename)
          echo "Latest Run ID: $RUN_ID"

          if [ -n "$RUN_ID" ]; then
            MODEL_PATH=$(find "$MLRUNS_DIR" -name "MLmodel" | head -1 | xargs dirname)
            echo "Model path: $MODEL_PATH"
            mlflow models build-docker -m "$MODEL_PATH" -n "$DOCKERHUB_USERNAME/wine-quality-mlproject:latest"
            docker push "$DOCKERHUB_USERNAME/wine-quality-mlproject:latest"
          else
            echo "No MLflow run found locally, skipping Docker build."
          fi

      - name: Upload MLflow artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-training-artifacts
          path: |
            MLProject/mlruns/
            MLProject/artifacts/
          retention-days: 30
